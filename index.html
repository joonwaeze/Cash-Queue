<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unlock Card Landing Page</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Config for Dark Mode and Fonts -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Figtree', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <!-- Babel Standalone for in-browser JSX parsing -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Figtree', sans-serif;
    }

    /* Optional sleek scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }
  </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-500 ease-in-out antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Direct copy of the UnlockCard component from our JSX file
    // Edit this data object to easily add/change items without touching the component below
    const unlockCardData = {
      title: "Unlocks in 13 days",
      date: "Apr 20",
      items: [
        {
          appName: "Coin Chef",
          earnedDate: "Dec 30",
          appIconUrl: "./Assest/image 54.png",
          earnedReward: "$0.50"
        },
        {
          appName: "Animals & Coins",
          earnedDate: "Jan 22",
          appIconUrl: "./Assest/image 53.png",
          earnedReward: "$2.50"
        },
        {
          appName: "Monopoly Go!",
          earnedDate: "Jan 22",
          appIconUrl: "./Assest/image 55.png",
          earnedReward: "$5.00"
        }
      ]
    };

    function UnlockCard({
      title = unlockCardData.title,
      date = unlockCardData.date,
      items = unlockCardData.items
    }) {

      // Dynamically calculate the total earned by parsing the reward strings
      const calculatedTotal = items.reduce((acc, item) => {
        const val = parseFloat((item.earnedReward || "").replace(/[^0-9.-]+/g, ""));
        return acc + (isNaN(val) ? 0 : val);
      }, 0);
      const totalEarned = `$${calculatedTotal.toFixed(2)}`;

      return (
        <div className="w-full max-w-[358px] bg-white dark:bg-[#1E1E1E] rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.04)] dark:shadow-none dark:border dark:border-gray-800 p-5">

          {/* Top Section */}
          <div className="flex flex-col pb-6 relative overflow-hidden">
            <h2 className="text-[18px] font-bold text-[#333333] dark:text-[#333333] leading-snug tracking-tight">
              {typeof title === 'string' ? title.split(/(\d+ days)/i).map((part, i) =>
                /^\d+ days$/i.test(part) ? <span key={i} className="text-[#FF5C01]">{part}</span> : part
              ) : title}
            </h2>
            <div className="text-[16px] font-bold text-[#666666] mt-1 flex items-center space-x-1.5">
              <span>{totalEarned}</span>
              <span className="text-[16px]">&bull;</span>
              <span>{date}</span>
            </div>
          </div>

          {/* Bottom Section (List of Apps) */}
          <div className="flex flex-col gap-2">
            {items.map((item, index) => (
              <div key={index} className="flex items-center justify-between p-2.5 -mx-2.5 hover:bg-[#FAFAFA] dark:hover:bg-gray-700/30 rounded-[14px] transition-all duration-300 ease cursor-pointer hover:scale-[1.02]">

                {/* Left Side: App Info */}
                <div className="flex items-center space-x-3.5">
                  <div className="relative overflow-hidden rounded-[14px] bg-gray-100 dark:bg-gray-800 shadow-sm border border-gray-100/50 dark:border-gray-700/50">
                    <img
                      src={item.appIconUrl}
                      alt={`${item.appName} icon`}
                      className="w-[44px] h-[44px] object-cover flex-shrink-0"
                    />
                  </div>
                  <div className="flex flex-col">
                    <span className="text-[16px] font-semibold text-[#333333] dark:text-gray-100 leading-tight">
                      {item.appName}
                    </span>
                    <span className="text-[16px] font-semibold text-[#666666] dark:text-[#666666] mt-0.5">
                      Earned {item.earnedDate}
                    </span>
                  </div>
                </div>

                {/* Right Side: Value */}
                <div className="text-[18px] font-bold text-[#333333] dark:text-[#333333]">
                  {item.earnedReward}
                </div>

              </div>
            ))}
          </div>
        </div>
      );
    }

    function BoostBanner() {
      const { useState } = React;
      const motion = window.Motion ? window.Motion.motion : null;
      const [isHovered, setIsHovered] = useState(false);

      if (!motion) {
        return <div className="text-red-500 text-sm">Framer Motion script not loaded.</div>;
      }

      return (
        <motion.div
          layout
          className={`flex items-center justify-center bg-[#FCF4EC] dark:bg-[#3E2E1D] border select-none cursor-pointer outline-none focus:ring-2 focus:ring-[#FCB78B] transition-all duration-200 ${isHovered ? 'border-[#FCB78B]' : 'border-[#EBE4D9]'} dark:border-[#EBE4D9]`}
          style={{
            borderRadius: '18px',
            padding: '8px 5px 8px 10px',
          }}
          onHoverStart={() => setIsHovered(true)}
          onHoverEnd={() => setIsHovered(false)}
          transition={{ type: "spring", stiffness: 350, damping: 28 }}
          aria-label="Boost banner"
        >
          <motion.div layout="position" className="flex-shrink-0 flex items-center justify-center z-10 w-[52px] h-[52px]">
            <img src="./Assest/Watch.svg" alt="Boost watch" className="w-[39px] h-[39px] object-contain flex-shrink-0 transition-all duration-200" style={{ filter: isHovered ? 'saturate(1.8)' : 'saturate(1)' }} />
          </motion.div>

          <motion.div
            layout="position"
            initial={{ opacity: 0, x: -10 }}
            animate={{ opacity: 1, x: 0 }}
            transition={{ duration: 0.2, ease: "easeOut" }}
            className="overflow-hidden text-left font-['Figtree',_sans-serif] flex ml-1"
          >
            <p className="text-[14px] font-semibold text-[#1F1F1F] dark:text-[#EAEAEA] leading-snug w-[184px] whitespace-normal pr-1">
              5x Boost active! Rewards unlock up to 6 days sooner
            </p>
          </motion.div>
        </motion.div>
      );
    }

    function LandingPage() {
      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6 space-y-8 relative">
          <BoostBanner />
          <UnlockCard />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LandingPage />);
  </script>
</body>

</html>
