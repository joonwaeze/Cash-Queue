<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Page metadata -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Component page</title>

  <!-- Google Fonts preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Figtree font family: 400 (Regular), 500 (Medium), 600 (SemiBold), 700 (Bold) -->
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS via CDN for utility-first styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Figtree', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- React 18 via CDN for component-based UI -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel for transpiling JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Canvas Confetti for celebratory animations -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <!-- Custom styles for page -->
  <style>
    /* Set default font family for entire page */
    body {
      font-family: 'Figtree', sans-serif;
    }

    /* Custom scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    /* Dark mode scrollbar color */
    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }
  </style>
</head>

<!-- Main page body with light/dark mode support -->

<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-500 ease-in-out antialiased">
  <!-- React app root element -->
  <div id="root"></div>

  <script type="text/babel">
    /* ===================== */
    /* REACT HOOKS          */
    /* ===================== */
    const { useState, useEffect } = React;

    /* ===================== */
    /* BOOST BANNER         */
    /* Purpose: Displays a promotional banner showing boost multiplier status */
    /* Features: Hover effects on border and image saturation */
    /* ===================== */
    function BoostBanner() {
      const [isHovered, setIsHovered] = useState(false);

      return (
        <div
          className={`flex items-center justify-center bg-[#FCF4EC] dark:bg-[#3E2E1D] border select-none cursor-pointer outline-none focus:ring-2 focus:ring-[#FCB78B] transition-all duration-200 ${isHovered ? 'border-[#FCB78B]' : 'border-[#EBE4D9]'} dark:border-[#EBE4D9]`}
          style={{
            borderRadius: '18px',
            padding: '8px 5px 8px 10px',
          }}
          onMouseEnter={() => setIsHovered(true)}
          onMouseLeave={() => setIsHovered(false)}
          aria-label="Boost banner"
        >
          {/* Watch icon container */}
          <div className="flex-shrink-0 flex items-center justify-center z-10 w-[52px] h-[52px]">
            <img
              src="./Assest/Watch.svg"
              alt="Boost watch"
              className="w-[39px] h-[39px] object-contain flex-shrink-0 transition-all duration-200"
              style={{ filter: isHovered ? 'saturate(1.8)' : 'saturate(1)' }}
            />
          </div>

          {/* Banner text content */}
          <div className="overflow-hidden text-left font-['Figtree',_sans-serif] flex ml-1">
            <p className="text-[14px] font-semibold text-[#1F1F1F] dark:text-[#EAEAEA] leading-snug w-[184px] whitespace-normal pr-1">
              Boost active! Rewards unlock up to 6 days sooner
            </p>
          </div>
        </div>
      );
    }

    /* ===================== */
    /* CASH QUEUE BOOST DATA */
    /* Purpose: Data structure for the CashQueueBoostCard reward system */
    /* How to add more items: Copy an item block and update the values */
    /* ===================== */

    /* Progress data - current and target points */
    const progressData = { current: 100, target: 500 };

    /* Card metadata */
    const cardMeta = {
      title: "Checklist",
      subtitle: "Click each item",
      footerText: "See all"
    };

    /* ===================== */
    /* REWARD ITEMS LIST     */
    /* Purpose: Array of reward tasks with their details */
    /* Properties:                                                          */
    /*   - id: Unique identifier (required for React key)                    */
    /*   - primaryText: Main task description                                */
    /*   - secondaryText: Subtitle/hint for the task                        */
    /*   - reward: Points earned for completing the task (e.g., "80 pts")    */
    /*   - iconBg: Background color for the icon container (hex code)        */
    /*   - iconUrl: Path to the icon image (local or remote)                */
    /* ===================== */
    const rewardItems = [
      {
        id: 1,
        primaryText: "Personal Care",
        secondaryText: "Touch grass",
        reward: "80 pts",
        iconBg: "#FEE4E2",
        iconUrl: "./Assest/icon-flame.svg"
      },
      {
        id: 2,
        primaryText: "Study",
        secondaryText: "Read a book",
        reward: "100 pts",
        iconBg: "#FFE4D9",
        iconUrl: "./Assest/icon-receipt.svg"
      },
      {
        id: 3,
        primaryText: "Try a new dish",
        secondaryText: "Something new",
        reward: "80 pts",
        iconBg: "#FFF3D9",
        iconUrl: "./Assest/icon-eyes.svg"
      },
      {
        id: 4,
        primaryText: "Relax",
        secondaryText: "Play a game",
        reward: "150 pts",
        iconBg: "#FFF3D9",
        iconUrl: "./Assest/Clashofclans.svg"
      }
      /* Add more items below by copying the structure above */
    ];

    /* ===================== */
    /* UNLOCK CARD DATA      */
    /* Purpose: Data structure for the UnlockCard showing earned rewards */
    /* Contains: title, date, and array of app items with earned rewards */
    /* ===================== */
    const unlockCardData = {
      title: "Unlocks in 13 days",
      date: "Apr 10",
      items: [
        {
          appName: "Coin Chef",
          earnedDate: "Dec 30",
          appIconUrl: "./Assest/image 54.png",
          earnedReward: "$0.50"
        },
        {
          appName: "Animals & Coins",
          earnedDate: "Jan 22",
          appIconUrl: "./Assest/image 53.png",
          earnedReward: "$2.50"
        },
        {
          appName: "Monopoly Go!",
          earnedDate: "Jan 22",
          appIconUrl: "./Assest/image 55.png",
          earnedReward: "$5.00"
        }
      ]
    };

    /* ===================== */
    /* UNLOCK CARD           */
    /* Purpose: Displays a list of apps with their earned rewards and dates */
    /* Features: Calculates total earned, displays app icons, hover animations, countdown timer */
    /* ===================== */
    function UnlockCard({
      title = unlockCardData.title,
      date = unlockCardData.date,
      items = unlockCardData.items
    }) {
      const monthMap = { 'Jan': 0, 'Feb': 1, 'Mar': 2, 'Apr': 3, 'May': 4, 'Jun': 5, 'Jul': 6, 'Aug': 7, 'Sep': 8, 'Oct': 9, 'Nov': 10, 'Dec': 11 };
      const dateParts = date.split(' ');
      const month = monthMap[dateParts[0]] || 0;
      const day = parseInt(dateParts[1], 10) || 1;
      const currentYear = new Date().getFullYear();
      const targetDate = new Date(currentYear, month, day, 23, 59, 59);
      const [timeLeft, setTimeLeft] = useState(() => {
        const now = new Date();
        const diff = targetDate - now;
        if (diff <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0 };
        return {
          days: Math.floor(diff / (1000 * 60 * 60 * 24)),
          hours: Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
          minutes: Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)),
          seconds: Math.floor((diff % (1000 * 60)) / 1000)
        };
      });

      useEffect(() => {
        const timer = setInterval(() => {
          const now = new Date();
          const diff = targetDate - now;
          if (diff <= 0) {
            clearInterval(timer);
            return;
          }
          setTimeLeft({
            days: Math.floor(diff / (1000 * 60 * 60 * 24)),
            hours: Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
            minutes: Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)),
            seconds: Math.floor((diff % (1000 * 60)) / 1000)
          });
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      const countdownText = `Unlocks in   ${timeLeft.hours} hr ${timeLeft.minutes} m ${timeLeft.seconds}s`;

      // Calculate total earned amount from all reward items
      const calculatedTotal = items.reduce((acc, item) => {
        const val = parseFloat((item.earnedReward || "").replace(/[^0-9.-]+/g, ""));
        return acc + (isNaN(val) ? 0 : val);
      }, 0);
      const totalEarned = `$${calculatedTotal.toFixed(2)}`;

      return (
        <div className="w-full max-w-[358px] bg-white dark:bg-[#1E1E1E] rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.04)] dark:shadow-none dark:border dark:border-gray-800 p-5">

          {/* Card header: title and summary stats */}
          <div className="flex flex-col pb-5">
            {/* Title with countdown timer */}
            <h2 className="text-[18px] font-bold text-[#333333] dark:text-[#333333] leading-snug tracking-tight">
              {countdownText.split(/(\d+ hr \d+ m \d+s)/i).map((part, i) =>
                /^\d+ hr \d+ m \d+s$/i.test(part) ? <span key={i} className="text-[#FF5C01]">{part}</span> : part
              )}
            </h2>
            {/* Total earned amount and date */}
            <div className="text-[16px] font-bold text-[#666666] mt-1 flex items-center space-x-1.5">
              <span>{totalEarned}</span>
              <span>&bull;</span>
              <span>{date}</span>
            </div>
          </div>

          {/* List of reward items */}
          <div className="flex flex-col gap-2">
            {items.map((item, index) => (
              <div
                key={index}
                className="flex items-center justify-between p-2.5 -mx-2.5 hover:bg-[#FAFAFA] dark:hover:bg-gray-700/30 rounded-[14px] transition-all duration-300 ease-in-out cursor-pointer hover:scale-[1.02]"
              >
                {/* App icon and name */}
                <div className="flex items-center space-x-3.5">
                  <div className="relative overflow-hidden rounded-[14px] bg-gray-100 dark:bg-gray-800 shadow-sm border border-gray-100/50 dark:border-gray-700/50">
                    <img
                      src={item.appIconUrl}
                      alt={`${item.appName} icon`}
                      className="w-[44px] h-[44px] object-cover flex-shrink-0"
                    />
                  </div>
                  {/* App name and earned date */}
                  <div className="flex flex-col">
                    <span className="text-[16px] font-semibold text-[#333333] dark:text-gray-100 leading-tight">
                      {item.appName}
                    </span>
                    <span className="text-[14px] font-semibold text-[#666666] dark:text-[#666666] mt-0.5">
                      Earned {item.earnedDate}
                    </span>
                  </div>
                </div>

                {/* Reward amount */}
                <div className="text-[18px] font-bold text-[#333333] dark:text-[#333333]">
                  {item.earnedReward}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ===================== */
    /* CASH QUEUE BOOST CARD */
    /* Purpose: Displays reward progress, tasks list, and actions to earn points */
    /* Features: Progress bar, reward icons, hover effects, "See more" toggle, drag-to-reorder */
    /* ===================== */
    function CashQueueBoostCard({
      progress = progressData,
      title = cardMeta.title,
      subtitle = cardMeta.subtitle,
      footerText = cardMeta.footerText,
      items = rewardItems,
      maxVisibleItems = 3
    }) {
      const [isFooterHovered, setIsFooterHovered] = useState(false);
      /* Track expanded state for "See more/Less" toggle */
      const [isExpanded, setIsExpanded] = useState(false);
      /* Track drag state for reordering items */
      const [localItems, setLocalItems] = useState([...items]);
      const [draggedIndex, setDraggedIndex] = useState(null);
      const [dragOverIndex, setDragOverIndex] = useState(null);
      /* Track completed items */
      const [completedItems, setCompletedItems] = useState(new Set());
      /* Track progress with accumulated rewards */
      const [localProgress, setLocalProgress] = useState({ ...progress });
      /* Track items currently swiping (animation) */
      const [swipingItems, setSwipingItems] = useState(new Set());
      /* Track items sliding in to bottom */
      const [slidingInItems, setSlidingInItems] = useState(new Set());
      /* Track sorted item order */
      const [sortedItemIds, setSortedItemIds] = useState(() => items.map(item => item.id));

      /* Track card phase: 'active' | 'exiting' | 'success' */
      const [cardPhase, setCardPhase] = useState('active');

      // Sort items by sortedItemIds order
      const getSortedItems = () => {
        return [...localItems].sort((a, b) => {
          const aIndex = sortedItemIds.indexOf(a.id);
          const bIndex = sortedItemIds.indexOf(b.id);
          return aIndex - bIndex;
        });
      };

      // Calculate progress percentage for the progress bar
      const progressPercent = (localProgress.current / localProgress.target) * 100;

      /* Determine which items to display based on expanded state and sorted order */
      const sortedItems = getSortedItems();
      const displayedItems = isExpanded ? sortedItems : sortedItems.slice(0, maxVisibleItems);
      const hasMoreItems = localItems.length > maxVisibleItems;

      /* Handle item click to mark as completed */
      const handleItemClick = (item) => {
        if (completedItems.has(item.id) || swipingItems.has(item.id) || slidingInItems.has(item.id)) return;

        // Extract reward value
        const rewardValue = parseInt(item.reward.replace(/[^0-9]/g, ''), 10);

        // Mark item as completed immediately (show checkmark + "Done!")
        setCompletedItems(prev => new Set([...prev, item.id]));

        // Update progress
        setLocalProgress(prev => {
          const newCurrent = Math.min(prev.current + rewardValue, prev.target);
          
          // Check if target reached
          if (newCurrent >= prev.target && prev.current < prev.target) {
            // Wait for progress bar animation and swipe to finish
            setTimeout(() => {
              setCardPhase('exiting');
              
              // Wait for exit animation to complete before showing success
              setTimeout(() => {
                setCardPhase('success');
                
                // Trigger full-viewport confetti falling from top
                if (window.confetti) {
                  window.confetti({
                    particleCount: 120,
                    angle: 270,        // Straight down
                    spread: 120,       // Wide spread
                    origin: { x: 0.5, y: -0.1 }, // Top of screen
                    startVelocity: 40,
                    gravity: 0.8,      // Light, floaty feel
                    ticks: 350,
                    colors: ['#FF5C01', '#FFB78B', '#FEE4E2', '#FFF3D9', '#4CAF50', '#2196F3']
                  });
                }
              }, 400); // Wait for exit transition (400ms)
            }, 1000); 
          }
          
          return {
            ...prev,
            current: newCurrent
          };
        });

        // Start swiping animation after a short delay (so user sees completed state)
        setTimeout(() => {
          setSwipingItems(prev => new Set([...prev, item.id]));
        }, 900);

        // After swipe animation (350ms), slide in to bottom seamlessly
        setTimeout(() => {
          // Remove swiping state
          setSwipingItems(prev => {
            const newSet = new Set(prev);
            newSet.delete(item.id);
            return newSet;
          });

          // Start sliding in from left
          setSlidingInItems(prev => new Set([...prev, item.id]));

          // Move completed item to bottom
          setSortedItemIds(prev => {
            const newIds = prev.filter(id => id !== item.id);
            return [...newIds, item.id];
          });
        }, 1250);

        // Clear sliding in state after slide in animation
        setTimeout(() => {
          setSlidingInItems(prev => {
            const newSet = new Set(prev);
            newSet.delete(item.id);
            return newSet;
          });
        }, 1600);
      };

      /* Handle drag start */
      const handleDragStart = (e, index) => {
        setDraggedIndex(index);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', index);
      };

      /* Handle drag over */
      const handleDragOver = (e, index) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        setDragOverIndex(index);
      };

      /* Handle drag end */
      const handleDragEnd = () => {
        if (draggedIndex !== null && dragOverIndex !== null && draggedIndex !== dragOverIndex) {
          const newItems = [...localItems];
          const [draggedItem] = newItems.splice(draggedIndex, 1);
          newItems.splice(dragOverIndex, 0, draggedItem);
          setLocalItems(newItems);
        }
        setDraggedIndex(null);
        setDragOverIndex(null);
      };

      /* Handle touch events for mobile drag */
      const handleTouchStart = (e, index) => {
        setDraggedIndex(index);
      };

      const handleTouchMove = (e, index) => {
        if (draggedIndex === null) return;

        const touch = e.touches[0];
        const elementBelow = document.elementFromPoint(touch.clientX, touch.clientY);
        const itemElement = elementBelow?.closest('[data-drag-item]');

        if (itemElement) {
          const newIndex = parseInt(itemElement.dataset.dragIndex, 10);
          if (!isNaN(newIndex) && newIndex !== dragOverIndex) {
            setDragOverIndex(newIndex);
          }
        }
      };

      const handleTouchEnd = () => {
        if (draggedIndex !== null && dragOverIndex !== null && draggedIndex !== dragOverIndex) {
          const newItems = [...localItems];
          const [draggedItem] = newItems.splice(draggedIndex, 1);
          newItems.splice(dragOverIndex, 0, draggedItem);
          setLocalItems(newItems);
        }
        setDraggedIndex(null);
        setDragOverIndex(null);
      };

      /* CSS for fade-in animation */
      const style = `
        @keyframes fadeSlideIn {
          from {
            opacity: 0;
            transform: translateY(8px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
        .animate-fade-in {
          animation: fadeSlideIn 300ms ease-in-out forwards;
        }
        @keyframes scaleIn {
          from {
            opacity: 0;
            transform: scale(0.5);
          }
          to {
            opacity: 1;
            transform: scale(1);
          }
        }
        .animate-scale-in {
          animation: scaleIn 300ms ease-in-out forwards;
        }
        @keyframes swipeRightToLeft {
          from {
            transform: translateX(0);
            opacity: 1;
          }
          to {
            transform: translateX(-120%);
            opacity: 0.5;
          }
        }
        @keyframes slideUp {
          from {
            transform: translateY(20px);
            opacity: 0;
          }
          to {
            transform: translateY(0);
            opacity: 1;
          }
        }
        @keyframes slideInFromLeft {
          from {
            transform: translateX(-100%);
            opacity: 0;
          }
          to {
            transform: translateX(0);
            opacity: 1;
          }
        }
        .animate-swipe-out {
          animation: swipeRightToLeft 350ms ease-in-out forwards;
        }
        .animate-slide-in {
          animation: slideInFromLeft 350ms ease-in-out forwards;
        }
        .animate-slide-up {
          animation: slideUp 350ms ease-in-out forwards;
        }
      `;

      /* ===================== */
      /* CHEVRON DOWN ICON     */
      /* Purpose: Small downward arrow for footer button */
      /* ===================== */
      const ChevronDownIcon = () => (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M6 9l6 6 6-6" />
        </svg>
      );

      /* ===================== */
      /* CHECK ICON            */
      /* Purpose: Checkmark for completed state */
      /* ===================== */
      const CheckIcon = () => (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" fill="#1F1F1F" />
          <path d="M15.5 9L11 14.5L9 12.5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      );

      return (
        <>
          <style>{style}</style>
          <div className="w-full max-w-[358px] bg-white dark:bg-[#1E1E1E] rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.04)] dark:shadow-none dark:border dark:border-gray-800 p-5 overflow-hidden relative min-h-[300px]">
            {/* ACTIVE STATE WRAPPER. Always relative to keep card height intact. Scales down and fades out on exit. */}
            <div className={`flex flex-col pt-3 transition-all duration-400 ease-in-out transform origin-center ${cardPhase !== 'active' ? 'opacity-0 scale-95 pointer-events-none' : 'opacity-100 scale-100'}`}>
              {/* Title and subtitle */}
              <div className="mb-3 text-center">
                <h2 className="text-[26px] font-bold text-[#333333] dark:text-[#E5E5E5] leading-tight">{title}</h2>
                <p className="text-[16px] font-semibold text-[#666666] dark:text-[#666666] mt-0">{subtitle}</p>
              </div>

              {/* Progress container with bar and pts count */}
              <div className="mb-5 flex flex-col items-center">
                <div className="h-2 bg-[#F0F0F0] dark:bg-gray-700 rounded-full overflow-hidden mb-2 w-[160px]">
                  <div
                    className="h-full bg-[#FF5C01] rounded-full transition-all duration-500 ease-in-out"
                    style={{ width: `${progressPercent}%` }}
                  />
                </div>
                <div className="w-[160px] flex justify-end">
                  <div className="flex items-baseline gap-1">
                    <span className="text-[14px] font-bold text-[#FF5C01] leading-none">{localProgress.current}</span>
                    <span className="text-[14px] font-bold text-[#333333] dark:text-[#999999]">/{localProgress.target}</span>
                    <span className="text-[14px] font-semibold text-[#333333]">pts</span>
                  </div>
                </div>
              </div>

              {/* List of reward tasks - limited to maxVisibleItems unless expanded */}
              <div className="flex flex-col gap-2">
                {displayedItems.map((item, index) => {
                  const sortedIndex = sortedItems.indexOf(item);
                  const isDragging = draggedIndex === sortedIndex;
                  const isDragOver = dragOverIndex === sortedIndex && draggedIndex !== sortedIndex;
                  const isNewlyVisible = isExpanded && index >= maxVisibleItems;
                  const isCompleted = completedItems.has(item.id);
                  const isSwiping = swipingItems.has(item.id);
                  const isSlidingIn = slidingInItems.has(item.id);

                  return (
                    <div
                      key={item.id}
                      data-drag-item
                      data-drag-index={sortedIndex}
                      draggable={!isCompleted && !isSwiping && !isSlidingIn}
                      onDragStart={(e) => handleDragStart(e, sortedIndex)}
                      onDragOver={(e) => handleDragOver(e, sortedIndex)}
                      onDragEnd={handleDragEnd}
                      onTouchStart={(e) => handleTouchStart(e, sortedIndex)}
                      onTouchMove={(e) => handleTouchMove(e, sortedIndex)}
                      onTouchEnd={handleTouchEnd}
                      onClick={() => !isCompleted && !isSwiping && !isSlidingIn && handleItemClick(item)}
                      className={`flex items-center justify-between p-2.5 -mx-2.5 rounded-[14px] transition-all duration-300 ease-in-out ${isCompleted ? 'cursor-default' : 'cursor-grab active:cursor-grabbing'} hover:bg-[#FAFAFA] dark:hover:bg-gray-700/30 hover:scale-[1.02] ${isDragging ? 'opacity-50 scale-95' : ''} ${isSwiping ? 'animate-swipe-out' : isSlidingIn ? 'animate-slide-in' : isNewlyVisible ? 'animate-fade-in' : ''}`}
                    >
                      {/* Icon and task description */}
                      <div className="flex items-center space-x-3.5 flex-1 min-w-0">
                        <div
                          className="w-[44px] h-[44px] rounded-[14px] flex items-center justify-center flex-shrink-0 overflow-hidden"
                          style={{ backgroundColor: item.iconBg }}
                        >
                          <img
                            src={item.iconUrl}
                            alt={item.primaryText}
                            className={`w-[42px] h-[42px] object-contain transition-all duration-300 ${isCompleted ? 'grayscale' : ''}`}
                          />
                        </div>
                        {/* Task primary and secondary text */}
                        <div className="flex flex-col min-w-0">
                          <span className={`text-[16px] font-semibold leading-tight truncate transition-all duration-300 ${isCompleted ? 'text-[#333333] line-through opacity-60' : 'text-[#333333] dark:text-gray-100'}`}>
                            {item.primaryText}
                          </span>
                          <span className={`text-[14px] font-semibold mt-0.5 truncate transition-all duration-300 ${isCompleted ? 'text-[#333333] opacity-60' : 'text-[#666666] dark:text-[#666666]'}`}>
                            {isCompleted ? 'Done!' : item.secondaryText}
                          </span>
                        </div>
                      </div>

                      {/* Reward points amount or checkmark */}
                      <div className={`text-[18px] font-bold pl-2 transition-all duration-300 ${isCompleted ? 'w-[24px] h-[24px]' : 'text-[#1F1F1F]'}`}>
                        {isCompleted ? (
                          <div className="animate-scale-in">
                            <CheckIcon />
                          </div>
                        ) : (
                          item.reward
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Footer "See more/Less" button with chevron */}
              {/* Only show button if there are more items than maxVisibleItems */}
              {hasMoreItems && (
                <button
                  className="mt-4 mx-auto flex items-center gap-1.5 px-4 py-2 text-[14px] font-semibold text-[#999999] dark:text-[#666666] hover:text-[#FF5C01] dark:hover:text-[#FF5C01] transition-colors duration-200 rounded-lg"
                  onMouseEnter={() => setIsFooterHovered(true)}
                  onMouseLeave={() => setIsFooterHovered(false)}
                  onClick={() => setIsExpanded(!isExpanded)}
                  aria-label={isExpanded ? "See less" : footerText}
                >
                  <span>{isExpanded ? "See less" : footerText}</span>
                  <span className={`transition-transform duration-200 ${isFooterHovered ? 'translate-y-0.5' : ''} ${isExpanded ? 'rotate-180' : ''}`}>
                    <ChevronDownIcon />
                  </span>
                </button>
              )}
            </div>

            {/* SUCCESS STATE WRAPPER. Positioned absolute to perfectly overlap original card bounds. */}
            <div className={`absolute inset-0 p-5 flex flex-col items-center justify-center transition-all duration-500 ease-in-out transform origin-center ${cardPhase === 'success' ? 'opacity-100 scale-100' : 'opacity-0 scale-75 pointer-events-none'}`}>
              <h2 className="text-[28px] font-bold text-[#333333] dark:text-[#EAEAEA] leading-tight text-center mb-2">
                Congratulations!
              </h2>
              <p className="text-[16px] font-semibold text-[#666666] dark:text-[#999999] text-center max-w-[240px]">
                You've successfully reached your target for today.
              </p>
            </div>
          </div>
        </>
      );
    }

    /* ===================== */
    /* TAB TOGGLE COMPONENT  */
    /* Purpose: Toggle between Daily Goals and Reward Queue views */
    /* Features: Active state styling, smooth transitions, mobile-optimized */
    /* ===================== */
    function TabToggle({ activeTab, onTabChange }) {
      return (
        <div className="flex items-center bg-[#F5F5F5] dark:bg-[#2A2A2A] rounded-[14px] p-1 gap-1 select-none touch-manipulation -webkit-tap-highlight-color-transparent w-full max-w-[358px]">
          <button
            onClick={() => onTabChange('daily')}
            onTouchEnd={(e) => { e.preventDefault(); onTabChange('daily'); }}
            className={`flex-[1_1_100%] min-w-0 px-4 sm:px-5 py-2.5 rounded-[10px] text-[14px] font-semibold transition-all duration-200 ease-in-out cursor-pointer active:scale-95 whitespace-nowrap ${activeTab === 'daily'
              ? 'bg-white dark:bg-[#1E1E1E] text-[#333333] dark:text-[#E5E5E5] shadow-sm'
              : 'text-[#999999] dark:text-[#666666]'
              }`}
          >
            Activities
          </button>
          <button
            onClick={() => onTabChange('reward')}
            onTouchEnd={(e) => { e.preventDefault(); onTabChange('reward'); }}
            className={`flex-[1_1_100%] min-w-0 px-4 sm:px-5 py-2.5 rounded-[10px] text-[14px] font-semibold transition-all duration-200 ease-in-out cursor-pointer active:scale-95 whitespace-nowrap ${activeTab === 'reward'
              ? 'bg-white dark:bg-[#1E1E1E] text-[#333333] dark:text-[#E5E5E5] shadow-sm'
              : 'text-[#999999] dark:text-[#666666]'
              }`}
          >
            Rewards
          </button>
        </div>
      );
    }

    /* ===================== */
    /* LANDING PAGE           */
    /* Purpose: Main page container with tab navigation between views */
    /* Features: Tab toggle at bottom, conditional rendering based on active tab */
    /* ===================== */
    function LandingPage() {
      /* Track active tab: 'daily' shows CashQueueBoostCard, 'reward' shows UnlockCard + BoostBanner */
      const [activeTab, setActiveTab] = useState('daily');
      const [isTransitioning, setIsTransitioning] = useState(false);

      const handleTabChange = (tab) => {
        if (tab === activeTab) return;
        setIsTransitioning(true);
        setTimeout(() => {
          setActiveTab(tab);
          setTimeout(() => setIsTransitioning(false), 50);
        }, 150);
      };

      return (
        <div className="min-h-screen flex flex-col items-center relative">
          {/* Conditional rendering based on active tab with fade transition */}
          <div className={`w-full max-w-[358px] pt-16 sm:pt-[30vh] transition-opacity duration-200 ease-in-out ${isTransitioning ? 'opacity-0' : 'opacity-100'}`}>
            {activeTab === 'daily' ? (
              /* Daily Goals view: Shows CashQueueBoostCard with reward progress */
              <CashQueueBoostCard />
            ) : (
              /* Reward Queue view: Shows BoostBanner and UnlockCard */
              <div className="flex flex-col items-center">
                <div className="w-full max-w-[260px]">
                  <BoostBanner />
                </div>
                <div className="w-full mt-10">
                  <UnlockCard />
                </div>
              </div>
            )}
          </div>

          {/* Tab toggle for switching between Daily Goals and Reward Queue - positioned at bottom */}
          <div className="fixed bottom-8 left-1/2 -translate-x-1/2">
            <TabToggle activeTab={activeTab} onTabChange={handleTabChange} />
          </div>
        </div>
      );
    }

    /* ===================== */
    /* APP INITIALIZATION    */
    /* Purpose: Mount React app to DOM */
    /* ===================== */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LandingPage />);
  </script>
</body>

</html>
